.header{background:#1a1a2e;padding:20px 30px;border-bottom:2px solid #e94560}

.chart-box h3{font-size:14px;color:#aaa;margin-bottom:15px}

.bar-label{width:90px;font-size:12px;color:#ccc;text-align:right;margin-right:8px;flex-shrink:0}
.bar-track{flex:1;background:#2a2a3e;height:20px;border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:6px;font-size:11px;font-weight:bold;color:#fff}
.bar-count{width:35px;text-align:right;font-size:12px;color:#aaa;margin-left:6px;flex-shrink:0}

.filter-bar select,.filter-bar input{background:#1a1a2e;border:1px solid #2a2a3e;color:#e0e0e0;padding:7px 12px;border-radius:6px;font-size:12px}
.filter-bar label{font-size:12px;color:#888}
table{width:100%;border-collapse:collapse;background:#1a1a2e;border-radius:10px;overflow:hidden}
th{background:#16213e;padding:10px 12px;text-align:left;font-size:11px;color:#888}
td{padding:8px 12px;border-bottom:1px solid #2a2a3e;font-size:12px}
tr:hover{background:#2a2a4e}
.views{color:#4ecca3;font-weight:bold}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:bold;background:#4ecca333;color:#4ecca3}
a{color:#e0e0e0;text-decoration:none}
a:hover{color:#e94560}
.country-tag{display:inline-block;padding:2px 6px;border-radius:4px;font-size:11px;font-weight:bold}

function tr(k){return T[k]||k;}
var C=['#e94560','#4ecca3','#ff6b35','#fbbf24','#a78bfa','#60a5fa','#f472b6','#34d399','#fb923c','#818cf8'];

function fm(n){if(!n)return'0';if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e4)return(n/1e3).toFixed(1)+'K';if(n>=1e3)return(n/1e3).toFixed(0)+'K';return String(n);}

function ctCls(cc){
    if(cc==='IN')return'ct-IN';if(cc==='US')return'ct-US';if(cc==='GB')return'ct-GB';
    if(cc==='AU')return'ct-AU';if(cc==='JP')return'ct-JP';if(cc==='KR')return'ct-KR';
    return'ct-other';
}

function buildStats(){
    var tv=0,tl=0,an=0;
    var countries={};
    DATA.forEach(function(v){
        tv+=v.view_count||0;tl+=v.like_count||0;
        if(v.hook_type)an++;
        var cc=v.country_code||'(?)';
        countries[cc]=(countries[cc]||0)+1;
    });
    var topCC='';var topN=0;
    for(var k in countries){if(countries[k]>topN){topN=countries[k];topCC=k;}}
    var cards=[
        {num:DATA.length,label:'Total Videos'},
        {num:fm(tv),label:'Total Views'},
        {num:an,label:'AI Analyzed'},
        {num:topCC,label:'Top Country'},
        {num:Object.keys(countries).length,label:'Countries'},
        {num:'DeepSeek',label:'AI Engine'},
    ];
    var h='';
    cards.forEach(function(c){h+='<div class=stat-card><div class=num>'+c.num+'</div><div class=label>'+c.label+'</div></div>';});
    document.getElementById('statCards').innerHTML=h;
}

function makeChart(id,getter){
    var map={};
    DATA.forEach(function(v){var k=getter(v);if(k){map[k]=(map[k]||0)+1;}});
    var sorted=[];for(var k in map)sorted.push([k,map[k]]);
    sorted.sort(function(a,b){return b[1]-a[1];});
    var total=0;sorted.forEach(function(p){total+=p[1];});if(!total)total=1;
    var h='';
    sorted.forEach(function(pair,i){
        var pct=Math.round(pair[1]/total*100);
        h+='<div class=bar-row><span class=bar-label title="'+pair[0]+'">'+pair[0]+'</span><div class=bar-track><div class=bar-fill style=width:'+pct+'%;background:'+C[i%10]+'>'+pct+'%</div></div><span class=bar-count>'+pair[1]+'</span></div>';
    });
    document.getElementById(id).innerHTML=h||'<div style=color:#666;padding:20px>No data</div>';
    return sorted;
}

function buildCharts(){
    var countries=makeChart('countryChart',function(v){return v.country_code||'(?)';});
    var hooks=makeChart('hookChart',function(v){return v.hook_type||'';});
    var emotions=makeChart('emotionChart',function(v){return v.primary_emotion||'';});
    makeChart('ctaChart',function(v){return v.cta_type||'';});

    var cs='<option value="">All Countries</option>';
    countries.forEach(function(p){cs+='<option value="'+p[0]+'">'+p[0]+'</option>';});
    document.getElementById('filterCountry').innerHTML=cs;
    var hs='<option value="">All Hooks</option>';
    hooks.forEach(function(p){hs+='<option value="'+p[0]+'">'+p[0]+'</option>';});
    document.getElementById('filterHook').innerHTML=hs;
    var es='<option value="">All Emotions</option>';
    emotions.forEach(function(p){es+='<option value="'+p[0]+'">'+p[0]+'</option>';});
    document.getElementById('filterEmotion').innerHTML=es;
}

function render(){
    var sortBy=document.getElementById('sortBy').value;
    var cf=document.getElementById('filterCountry').value;
    var hf=document.getElementById('filterHook').value;
    var ef=document.getElementById('filterEmotion').value;
    var sf=document.getElementById('filterSearch').value.toLowerCase();

    var filtered=DATA.filter(function(v){
        if(cf&&(v.country_code||'(?)')!==cf)return false;
        if(hf&&v.hook_type!==hf)return false;
        if(ef&&v.primary_emotion!==ef)return false;
        if(sf&&(v.title||'').toLowerCase().indexOf(sf)===-1)return false;
        return true;
    });

    if(sortBy==='views')filtered.sort(function(a,b){return(b.view_count||0)-(a.view_count||0);});
    else if(sortBy==='likes')filtered.sort(function(a,b){return(b.like_count||0)-(a.like_count||0);});
    else if(sortBy==='date')filtered.sort(function(a,b){return(b.publish_time||'').localeCompare(a.publish_time||'');});

    document.getElementById('resultCount').textContent='Showing '+filtered.length+' / '+DATA.length;

    var h='';
    filtered.forEach(function(v,i){
        var cc=v.country_code||'?';
        h+='<tr>';
        h+='<td style=color:#666>'+ (i+1) +'</td>';
        h+='<td><a href="'+(v.url||'#')+'" target=_blank>'+(v.title||'?').substring(0,60)+'</a><br><span style=font-size:10px;color:#666>'+(v.duration_sec||0)+'s</span></td>';
        h+='<td style=color:#aaa>'+(v.creator_name||'-')+'</td>';
        h+='<td><span class="country-tag '+ctCls(cc)+'">'+cc+'</span></td>';
        h+='<td class=views>'+fm(v.view_count)+'</td>';
        h+='<td><span class=badge>'+tr(v.hook_type)+'</span></td>';
        h+='<td>'+tr(v.primary_emotion)+'</td>';
        h+='<td>'+tr(v.cta_type)+'</td>';
        h+='<td style=color:#aaa;font-size:11px>'+tr(v.story_arc)+'</td>';
        h+='</tr>';
    });
    document.getElementById('videoList').innerHTML=h||'<tr><td colspan=9 style=text-align:center;color:#666;padding:30px>No matching videos</td></tr>';
}

buildStats();
buildCharts();
render();
</script>
