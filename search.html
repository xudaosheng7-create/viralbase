    h+=' Average views: '+fm(avgViews)+'.</div>';
    h+='</div>';

    // Video table
    h+='<table><thead><tr><th>#</th><th>Video</th><th>CC</th><th>Views</th><th>Hook</th><th>Emotion</th><th>CTA</th><th>Story Arc</th></tr></thead><tbody>';

    matched.sort(function(a,b){return(b.view_count||0)-(a.view_count||0);});
    matched.forEach(function(v,i){
        var cc=v.country_code||'?';
        h+='<tr>';
        h+='<td style=color:#666>'+(i+1)+'</td>';
        h+='<td><a href="'+(v.url||'#')+'" target=_blank>'+(v.title||'?').substring(0,60)+'</a><br><span style=font-size:10px;color:#666>'+(v.duration_sec||0)+'s</span></td>';
        h+='<td class=ct-'+cc+'>'+(CN[cc]||cc)+'</td>';
        h+='<td class=views>'+fm(v.view_count)+'</td>';
        h+='<td><span class=badge>'+v.hook_type+'</span></td>';
        h+='<td>'+v.primary_emotion+'</td>';
        h+='<td>'+v.cta_type+'</td>';
        h+='<td style=color:#aaa;font-size:11px>'+v.story_arc+'</td>';
        h+='</tr>';
    });
    h+='</tbody></table>';

    container.innerHTML=h;
}
</script>
</body>
</html>
